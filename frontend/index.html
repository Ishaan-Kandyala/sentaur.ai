<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sentaur AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .landing {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: var(--bg);
            color: var(--text);
        }

        .landing h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .landing p {
            font-size: 20px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .landing-buttons {
            display: flex;
            gap: 20px;
        }

        .landing-buttons a {
            padding: 14px 28px;
            background: #4a6cf7;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 18px;
        }

        .landing-buttons a:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="landing">
    <h1>Welcome to Sentaur AI</h1>
    <p>Your personal intelligent assistant -- fast, modern, and always ready to help.</p>

    <div class="landing-buttons">
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
