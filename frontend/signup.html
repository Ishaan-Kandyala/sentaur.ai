<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Sentaur AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .oauth-btn { display:flex; align-items:center; justify-content:center; gap:10px; padding:11px 16px; border-radius:8px; border:1px solid #ccc; background:white; cursor:pointer; font-size:15px; font-weight:500; text-decoration:none; color:#333; margin-bottom:10px; }
        .oauth-btn:hover { background:#f5f5f5; }
        .oauth-btn img { width:20px; height:20px; }
        .divider { display:flex; align-items:center; gap:10px; margin:12px 0; color:#999; font-size:13px; }
        .divider::before, .divider::after { content:""; flex:1; height:1px; background:#ddd; }
    </style>
</head>
<body>
<div class="container">
    <h2>Create Account</h2>

    <a class="oauth-btn" href="/auth/google">
        <img src="https://www.google.com/favicon.ico"> Sign up with Google
    </a>

    <div class="divider">or</div>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>
<script src="script.js"></script>
</body>
</html>
