<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sentaur AI – Chat</title>
    <link rel="stylesheet" href="styles.css">
    <script src="marked.min.js"></script>
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-logo">S</div>
            <span class="sidebar-title">Sentaur AI</span>
        </div>
        <button class="new-chat-btn" onclick="newConversation()">＋ New Chat</button>
        <div id="history"></div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-area">

        <!-- Top Bar -->
        <div class="topbar">
            <h2>Chat</h2>
            <div class="top-buttons">
                <a href="settings.html">Settings</a>
                <button onclick="toggleDarkMode()">🌙</button>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Chatbox -->
        <div id="chatbox" class="chatbox"></div>

        <!-- Typing Indicator -->
        <div id="typing" class="msg-row bot" style="display:none; padding: 0 32px 8px;">
            <div class="avatar bot-avatar">S</div>
            <div class="bubble typing-bubble">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <!-- Input Row -->
        <div class="input-row">
            <input
                id="msg"
                placeholder="Ask Sentaur anything..."
                onkeydown="if(event.key==='Enter') sendMessage()"
            >
            <button onclick="sendMessage()">Send →</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
