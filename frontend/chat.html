<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sentaur AI</title>
    <link rel="stylesheet" href="styles.css">
    <script src="marked.min.js"></script>
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-logo">S</div>
            <span class="sidebar-title">Sentaur AI</span>
        </div>
        <button class="new-chat-btn" onclick="newConversation()">New Chat</button>
        <div id="history"></div>
    </div>

    <!-- Main -->
    <div class="chat-area">

        <div class="topbar">
            <h2>Sentaur AI</h2>
            <div class="top-buttons">
                <a href="settings.html">Settings</a>
                <button onclick="toggleDarkMode()">🌙</button>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div id="chatbox" class="chatbox"></div>

        <!-- Typing indicator -->
        <div id="typing" class="typing-outer" style="display:none;">
            <div class="msg-row bot">
                <div class="bot-avatar">S</div>
                <div class="bot-content">
                    <div class="typing-dots">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="msg"
                    rows="1"
                    placeholder="Message Sentaur..."
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="send-btn" onclick="sendMessage()" title="Send">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                    </svg>
                </button>
            </div>
            <p class="input-hint">Sentaur can make mistakes. Always verify important information.</p>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
