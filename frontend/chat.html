<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sentaur AI – Chat</title>
    <link rel="stylesheet" href="styles.css">
    <script src="marked.min.js"></script>
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <button onclick="newConversation()" style="width:100%;margin-bottom:10px;">+ New Chat</button>
        <div id="history"></div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-area">

        <!-- Top Bar -->
        <div class="topbar">
            <h2>Sentaur AI</h2>
            <div class="top-buttons">
                <a href="settings.html">⚙️</a>
                <button onclick="toggleDarkMode()">🌙</button>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Chatbox -->
        <div id="chatbox" class="chatbox"></div>

        <!-- Typing Indicator -->
        <div id="typing" class="msg-row bot" style="display:none;">
            <div class="avatar bot-avatar">S</div>
            <div class="bubble typing-bubble">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <!-- Input Row -->
        <div class="input-row">
            <input 
                id="msg" 
                placeholder="Type a message..." 
                onkeydown="if(event.key==='Enter') sendMessage()"
            >
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
