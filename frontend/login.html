<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login – Sentaur AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .oauth-btn { display:flex; align-items:center; justify-content:center; gap:10px; padding:11px 16px; border-radius:8px; border:1px solid #ccc; background:white; cursor:pointer; font-size:15px; font-weight:500; text-decoration:none; color:#333; margin-bottom:10px; }
        .oauth-btn:hover { background:#f5f5f5; }
        .oauth-btn img { width:20px; height:20px; }
        .divider { display:flex; align-items:center; gap:10px; margin:12px 0; color:#999; font-size:13px; }
        .divider::before, .divider::after { content:""; flex:1; height:1px; background:#ddd; }
        .oauth-btn.github { background:#24292e; color:#fff; border-color:#24292e; }
        .oauth-btn.github:hover { background:#3a3f45; }
        .oauth-btn.github svg { fill:#fff; }
    </style>
</head>
<body>
<div class="container">
    <h2>Login</h2>

    <a class="oauth-btn" href="/auth/google">
        <img src="https://www.google.com/favicon.ico"> Sign in with Google
    </a>
    <a class="oauth-btn github" href="/auth/github">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        Sign in with GitHub
    </a>

    <div class="divider">or</div>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <p><a href="forgot-password.html">Forgot password?</a></p>
    <p>Don't have an account? <a href="signup.html">Sign up</a></p>
</div>
<script src="script.js"></script>
</body>
</html>
