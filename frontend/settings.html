<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Settings – Sentaur AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
<div class="container">
    <div class="brand">
        <div class="brand-logo">S</div>
        <span class="brand-name">Sentaur AI</span>
    </div>

    <h2>Settings</h2>

    <p><a href="chat.html">← Back to chat</a></p>
