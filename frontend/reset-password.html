<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset Password – Sentaur AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h2>Reset Password</h2>
    <input id="password" type="password" placeholder="New password">
    <input id="confirm" type="password" placeholder="Confirm new password">
    <button onclick="resetPassword()">Reset Password</button>
</div>
<script>
async function resetPassword() {
    const token = new URLSearchParams(window.location.search).get("token");
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;
    if (!token) return alert("Invalid reset link.");
    if (password !== confirm) return alert("Passwords do not match.");
    const res = await fetch("/auth/reset-password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ token, new_password: password })
    });
    const data = await res.json();
    if (res.ok) {
        alert("Password reset! You can now log in.");
        window.location = "login.html";
    } else {
        alert(data.detail || "Reset failed. Link may have expired.");
    }
}
</script>
</body>
</html>
