<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset Password – Sentaur AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
<div class="container">
    <div class="brand">
        <div class="brand-logo">S</div>
        <span class="brand-name">Sentaur AI</span>
    </div>

    <h2>Reset your password</h2>
    <p class="subtitle">We'll send a reset link to your email</p>

    <input id="email" type="email" placeholder="Email address">
    <button onclick="sendReset()">Send Reset Link</button>

    <p><a href="login.html">← Back to sign in</a></p>
</div>
<script>
async function sendReset() {
    const email = document.getElementById("email").value;
    const res = await fetch("/auth/forgot-password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email })
    });
    const data = await res.json();
    alert(data.message);
}
</script>
</body>
</html>
